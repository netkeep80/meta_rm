name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - 'include/**'
              - 'examples/**'
              - 'tests/**'
              - 'CMakeLists.txt'
              - 'tests/CMakeLists.txt'
            docs:
              - '**/*.md'
              - 'docs/**'
            workflow:
              - '.github/workflows/**'

  merge-check:
    name: Merge check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Simulate fresh merge with base branch
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin "$BASE_REF"
          BEHIND_COUNT=$(git rev-list --count HEAD..origin/"$BASE_REF")
          echo "Commits behind $BASE_REF: $BEHIND_COUNT"
          if [ "$BEHIND_COUNT" -gt 0 ]; then
            git merge "origin/$BASE_REF" --no-edit \
              || { echo "::error::Merge conflict with $BASE_REF. Rebase or merge before continuing."; exit 1; }
          fi

  lint:
    name: Lint (file size)
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.code == 'true' || needs.detect-changes.outputs.workflow == 'true' || needs.detect-changes.outputs.docs == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Enforce file size limits
        run: bash scripts/check-file-sizes.sh

  docs:
    name: Docs validation
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.docs == 'true' || needs.detect-changes.outputs.workflow == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check for broken links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --verbose --max-concurrency 4 --exclude-path build --exclude-path .git './**/*.md'
          fail: true

  build-and-test:
    name: ${{ matrix.compiler }} / ${{ matrix.build_type }}
    runs-on: ubuntu-latest
    needs: [detect-changes, lint]
    if: |
      always() &&
      !cancelled() &&
      needs.lint.result == 'success' &&
      (needs.detect-changes.outputs.code == 'true' || needs.detect-changes.outputs.workflow == 'true')
    strategy:
      fail-fast: false
      matrix:
        compiler: [g++, clang++]
        build_type: [Debug]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ clang

      - name: Configure
        env:
          CXX: ${{ matrix.compiler }}
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DMETA_RM_BUILD_TESTS=ON -DMETA_RM_ENABLE_WARNINGS=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -C ${{ matrix.build_type }}

  ci:
    name: CI summary
    runs-on: ubuntu-latest
    needs: [lint, docs, build-and-test, merge-check]
    if: always()
    steps:
      - name: Check required jobs
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS_JSON"
          echo "$NEEDS_JSON" | python3 -c '
          import json, sys
          needs = json.load(sys.stdin)
          failed = [n for n, v in needs.items() if v.get("result") == "failure"]
          if failed:
              print(f"::error::Required jobs failed: {failed}")
              sys.exit(1)
          print("All required jobs passed or were skipped.")
          '
